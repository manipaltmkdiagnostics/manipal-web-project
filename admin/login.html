<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Manipal Tumkur Diagnostics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <style>
        :root {
            --primary: #4169E1;
            --purple: #8B4789;
            --purple-dark: #6a3668;
            --bg-light-blue: #E8EEFF;
            --text-dark: #1A1A2E;
            --text-muted: #718096;
            --border: #E2E8F0;
            --white: #FFFFFF;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light-blue);
            padding: 20px;
            color: var(--text-dark);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .icon {
            width: 64px;
            height: 64px;
            background: var(--purple);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--white);
            font-weight: 800;
            margin-bottom: 14px;
            box-shadow: 0 4px 12px rgba(139, 71, 137, 0.3);
        }

        .login-logo h1 {
            color: var(--purple);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .login-logo p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
            font-weight: 500;
        }

        .login-card {
            background: var(--white);
            border: 2px solid var(--purple);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 10px 25px rgba(139, 71, 137, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: #F8FAFC;
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: #A0AEC0;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--purple);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(139, 71, 137, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--purple);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 71, 137, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            background: var(--purple-dark);
            box-shadow: 0 8px 25px rgba(139, 71, 137, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #FDEDEC;
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #E74C3C;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--purple);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--purple-dark);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="icon">M</div>
            <h1>Admin Portal</h1>
            <p>Manipal Tumkur Diagnostics</p>
        </div>

        <div class="login-card">
            <div class="error-msg" id="errorMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password"
                        autocomplete="current-password" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In →</button>
            </form>
        </div>

        <a href="/" class="back-link">← Back to Website</a>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('admin_token');
        if (token) {
            fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => { if (r.ok) window.location.href = '/admin/dashboard.html'; })
                .catch(() => { });
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', JSON.stringify(data.user));
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errEl.textContent = data.error || 'Invalid credentials';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Connection error. Please try again.';
                errEl.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = 'Sign In →';
        });
    </script>
</body>

</html>
